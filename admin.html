<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiếng Việt — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.1">
  <link rel="stylesheet" href="auth.css?v=1.1">
</head>
<body>

  <nav id="main-nav">
    <div class="nav-logo">Tiếng <em>Việt</em> <span style="font-size:.7rem;opacity:.6;font-family:var(--font-body);font-weight:600;margin-left:.5rem">ADMIN</span></div>
    <div class="nav-links"></div>
    <button class="nav-lesson-pill" id="nav-logout">Sign out</button>
  </nav>

  <div style="max-width:860px;margin:0 auto;padding:2rem 1.5rem">

    <!-- Pending teachers -->
    <div class="page-header">
      <h2>Pending teacher approvals</h2>
      <p>New teacher registrations waiting for your review</p>
    </div>
    <div id="pending-list" style="margin-bottom:2.5rem"></div>

    <!-- All users -->
    <div class="page-header">
      <h2>All users</h2>
      <p>Every registered student and teacher</p>
    </div>
    <div id="user-list"></div>

    <!-- Feedback -->
    <div class="page-header" style="margin-top:3rem">
      <h2>Feedback</h2>
      <p>Bug reports and change requests from users</p>
    </div>
    <div id="feedback-list" style="margin-bottom:2.5rem"></div>

  </div>

  <script src="auth.js?v=1.2"></script>
  <script>
    document.getElementById('nav-logout').addEventListener('click', logout);

    // Validate session first, then load data
    validateSession().then(user => {
      if (!user) return;
      if (user.role !== 'admin') {
        window.location.href = 'index.html';
        return;
      }
      load();
    });

    async function load() {
      // Pending teachers
      const pen = await api('admin.php', { action: 'pending' });
      const pendingEl = document.getElementById('pending-list');
      if (!pen.users.length) {
        pendingEl.innerHTML = '<p style="color:var(--ink-soft);font-style:italic">No pending registrations.</p>';
      } else {
        pendingEl.innerHTML = pen.users.map(u => `
          <div style="display:flex;align-items:center;gap:1rem;padding:.9rem 1rem;background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:.5rem;flex-wrap:wrap">
            <div style="flex:1">
              <div style="font-weight:700">${esc(u.full_name || '—')}</div>
              <div style="font-size:.82rem;color:var(--ink-soft)">${esc(u.email)} · registered ${relDate(u.created_at)}</div>
            </div>
            <button class="t-save-btn" onclick="decide(${u.id}, 'approve', this)">✓ Approve</button>
            <button class="ghost-btn" onclick="decide(${u.id}, 'reject', this)" style="color:var(--red);border-color:var(--red)">✕ Reject</button>
          </div>`).join('');
      }

      // All users
      const all = await api('admin.php', { action: 'users' });
      const userEl = document.getElementById('user-list');
      userEl.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:.84rem">
          <thead>
            <tr style="background:var(--navy);color:#fff">
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Name</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Email</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Role</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Status</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Last login</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Lessons</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">Quiz</th>
              <th style="padding:.6rem .9rem;text-align:left;font-weight:700;font-size:.72rem;letter-spacing:.5px;text-transform:uppercase">View</th>
            </tr>
          </thead>
          <tbody>
            ${all.users.map((u, i) => {
              const roleBg    = u.role === 'teacher' ? 'var(--teal-pale)' : 'var(--gold-pale)';
              const roleColor = u.role === 'teacher' ? 'var(--teal)' : '#7a5c00';
              const statusColor = u.status === 'active' ? 'var(--teal)' : u.status === 'pending' ? 'var(--gold)' : 'var(--red)';
              const rowBg = i % 2 === 0 ? '#fff' : 'var(--bg)';
              const canView = u.status === 'active';
              return `
              <tr style="background:${rowBg};border-bottom:1px solid var(--border)">
                <td style="padding:.6rem .9rem">${esc(u.full_name || '—')}</td>
                <td style="padding:.6rem .9rem;color:var(--ink-soft)">${esc(u.email)}</td>
                <td style="padding:.6rem .9rem"><span style="font-size:.7rem;font-weight:700;text-transform:uppercase;padding:.15rem .4rem;border-radius:4px;background:${roleBg};color:${roleColor}">${u.role}</span></td>
                <td style="padding:.6rem .9rem"><span style="color:${statusColor}">${u.status}</span></td>
                <td style="padding:.6rem .9rem;color:var(--ink-soft)">${u.last_login ? relDate(u.last_login) : 'Never'}</td>
                <td style="padding:.6rem .9rem">${u.lessons ?? '—'}</td>
                <td style="padding:.6rem .9rem">${u.q_total ? Math.round(u.q_score / u.q_total * 100) + '%' : '—'}</td>
                <td style="padding:.6rem .9rem">
                  ${canView ? `<button onclick="viewAs(${u.id}, '${u.role}')"
                    style="padding:.2rem .7rem;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);font-size:.72rem;font-weight:700;cursor:pointer;font-family:var(--font-body)"
                    title="View as this user">&#128065; View</button>` : '—'}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    async function viewAs(userId, role) {
      try {
        const res = await api('viewas.php', { action: 'start', target_id: userId });
        // Store view-as token
        localStorage.setItem('vn-va-token', res.va_token);
        // Redirect to the right page
        window.location.href = role === 'teacher' ? 'teacher.html' : 'index.html';
      } catch(e) {
        alert('Could not start view-as: ' + e.message);
      }
    }

    async function decide(id, action, btn) {
      btn.disabled = true;
      btn.textContent = action === 'approve' ? 'Approving…' : 'Rejecting…';
      try {
        await api('admin.php', { action, target_id: id });
        load();
      } catch(e) {
        alert(e.message);
        btn.disabled = false;
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function relDate(iso) {
      if (!iso) return '—';
      const d = Math.floor((Date.now() - new Date(iso)) / 86400000);
      if (d === 0) return 'today';
      if (d === 1) return 'yesterday';
      return d + 'd ago';
    }

    load();
    loadFeedback();

    async function loadFeedback() {
      const res = await api('feedback.php', { action: 'list' });
      const el  = document.getElementById('feedback-list');
      if (!res.items.length) {
        el.innerHTML = '<p style="color:var(--ink-soft);font-style:italic">No feedback yet.</p>';
        return;
      }
      const priorityColor = { low: '#7a5c00', medium: '#b85c00', high: 'var(--red)' };
      const priorityBg    = { low: 'var(--gold-pale)', medium: '#fff3e0', high: '#fff0f0' };
      el.innerHTML = res.items.map(f => `
        <div style="padding:.9rem 1rem;background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:.5rem">
          <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.35rem">
            <span style="font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.15rem .5rem;border-radius:4px;background:${priorityBg[f.priority]};color:${priorityColor[f.priority]}">${f.priority}</span>
            <span style="font-size:.72rem;font-weight:700;text-transform:uppercase;padding:.15rem .5rem;border-radius:4px;background:${f.type==='bug'?'#fff3f3':'#f0faf6'};color:${f.type==='bug'?'var(--red)':'var(--teal)'}">${f.type==='bug'?'🐛 Bug':'✨ Change'}</span>
            <strong style="flex:1">${esc(f.title)}</strong>
            <select onchange="updateFeedbackStatus(${f.id}, this.value)" style="font-size:.8rem;border:1px solid var(--border);border-radius:6px;padding:.2rem .4rem;font-family:var(--font-body)">
              <option value="new"      ${f.status==='new'?'selected':''}>New</option>
              <option value="reviewed" ${f.status==='reviewed'?'selected':''}>Reviewed</option>
              <option value="done"     ${f.status==='done'?'selected':''}>Done</option>
            </select>
          </div>
          ${f.body ? `<div style="font-size:.85rem;color:var(--ink-soft);margin-bottom:.3rem">${esc(f.body)}</div>` : ''}
          <div style="font-size:.78rem;color:var(--ink-soft)">by ${esc(f.full_name)} · ${relDate(f.created_at)}</div>
        </div>`).join('');
    }

    async function updateFeedbackStatus(id, status) {
      try { await api('feedback.php', { action: 'status', id, status }); }
      catch(e) { alert(e.message); }
    }
  </script>
</body>
</html>
