<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiếng Việt — Awaiting approval</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.1">
  <link rel="stylesheet" href="auth.css?v=1.1">
</head>
<body class="auth-body">
  <div class="auth-card" style="text-align:center">
    <div class="auth-logo">
      <span class="auth-flag" style="font-size:3rem">⏳</span>
      <h1 class="auth-title">Awaiting approval</h1>
    </div>
    <p style="color:var(--ink-mid);line-height:1.7;margin-bottom:1.5rem">
      Your email has been verified. Your teacher account is being reviewed
      by the administrator.<br><br>
      You will receive an email at the address you registered with once
      your account has been approved.
    </p>
    <p style="font-size:.85rem;color:var(--ink-soft)">
      Questions? Contact
      <a href="mailto:info@waytogrowth.nl">info@waytogrowth.nl</a>
    </p>
    <a href="login.html" class="auth-btn" style="display:block;margin-top:1.5rem;text-decoration:none;text-align:center">
      Back to sign in
    </a>
  </div>
</body>
</html>
