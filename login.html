<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiếng Việt — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=1.1">
  <link rel="stylesheet" href="auth.css?v=1.1">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-flag">🇻🇳</span>
      <h1 class="auth-title">Tiếng Việt</h1>
      <p class="auth-sub">by Way to Growth</p>
    </div>

    <!-- TAB SWITCHER -->
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign in</button>
      <button class="auth-tab" data-tab="register">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form class="auth-form active" id="form-login" novalidate>
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" id="login-email"
               placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input class="auth-input" type="password" id="login-password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" type="submit" id="login-submit">
        <span class="btn-text">Send verification code</span>
        <span class="btn-spinner" style="display:none">Sending…</span>
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form class="auth-form" id="form-register" novalidate>
      <div class="auth-field">
        <label class="auth-label">Full name</label>
        <input class="auth-input" type="text" id="reg-name"
               placeholder="Your full name" autocomplete="name" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input class="auth-input" type="email" id="reg-email"
               placeholder="your@email.com" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label class="auth-label">Password <span class="auth-hint">(min. 8 characters)</span></label>
        <input class="auth-input" type="password" id="reg-password"
               placeholder="••••••••" autocomplete="new-password" required minlength="8">
      </div>
      <div class="auth-field">
        <label class="auth-label">I am a…</label>
        <div class="auth-role-row">
          <label class="auth-role-opt">
            <input type="radio" name="role" value="student" checked>
            <span class="role-card">
              <span class="role-icon">👩‍🎓</span>
              <span class="role-name">Student</span>
              <span class="role-desc">Access flashcards, quizzes and readings</span>
            </span>
          </label>
          <label class="auth-role-opt">
            <input type="radio" name="role" value="teacher">
            <span class="role-card">
              <span class="role-icon">👩‍🏫</span>
              <span class="role-name">Teacher</span>
              <span class="role-desc">Manage students and content (requires approval)</span>
            </span>
          </label>
        </div>
      </div>
      <div class="auth-error" id="reg-error"></div>
      <button class="auth-btn" type="submit" id="reg-submit">
        <span class="btn-text">Create account</span>
        <span class="btn-spinner" style="display:none">Creating…</span>
      </button>
    </form>

  </div>

  <script src="auth.js?v=1.1"></script>
  <script>
    // Tab switching
    document.querySelectorAll('.auth-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab, .auth-form').forEach(el => el.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('form-' + btn.dataset.tab).classList.add('active');
      });
    });

    // Login
    document.getElementById('form-login').addEventListener('submit', async e => {
      e.preventDefault();
      const btn    = document.getElementById('login-submit');
      const errEl  = document.getElementById('login-error');
      const email  = document.getElementById('login-email').value.trim();
      const pass   = document.getElementById('login-password').value;

      errEl.textContent = '';
      btn.querySelector('.btn-text').style.display = 'none';
      btn.querySelector('.btn-spinner').style.display = '';
      btn.disabled = true;

      try {
        const res = await api('login.php', { email, password: pass });
        // Store user_id for the verify step
        sessionStorage.setItem('vn-pending-uid', res.user_id);
        sessionStorage.setItem('vn-pending-email', res.email);
        sessionStorage.setItem('vn-pending-role', res.role);
        window.location.href = 'verify.html';
      } catch (err) {
        errEl.textContent = err.message;
        btn.querySelector('.btn-text').style.display = '';
        btn.querySelector('.btn-spinner').style.display = 'none';
        btn.disabled = false;
      }
    });

    // Register
    document.getElementById('form-register').addEventListener('submit', async e => {
      e.preventDefault();
      const btn   = document.getElementById('reg-submit');
      const errEl = document.getElementById('reg-error');
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-password').value;
      const role  = document.querySelector('input[name="role"]:checked').value;

      errEl.textContent = '';
      btn.querySelector('.btn-text').style.display = 'none';
      btn.querySelector('.btn-spinner').style.display = '';
      btn.disabled = true;

      try {
        const res = await api('register.php', { full_name: name, email, password: pass, role });
        sessionStorage.setItem('vn-pending-uid',   res.user_id);
        sessionStorage.setItem('vn-pending-email', res.email);
        sessionStorage.setItem('vn-pending-role',  role);
        window.location.href = 'verify.html';
      } catch (err) {
        errEl.textContent = err.message;
        btn.querySelector('.btn-text').style.display = '';
        btn.querySelector('.btn-spinner').style.display = 'none';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
